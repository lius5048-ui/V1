<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Walmart 数据平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .product-card { transition: transform .15s, box-shadow .15s; cursor: pointer; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
        .rating-badge { font-size: .9rem; }
        .neg-review { border-left: 4px solid #dc3545; background: #fff5f5; }
        .pos-review { border-left: 4px solid #198754; background: #f0fff4; }
        .star { color: #ffc107; }
        .nav-link.active { font-weight: 600; }
        body { background: #f8f9fa; }
        .stat-card { border-radius: 12px; border: none; }
        .stat-card .card-body { padding: 1.2rem; }
        .stat-number { font-size: 1.8rem; font-weight: 700; }
        .chart-container { position: relative; height: 250px; }
        .truncate-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a237e">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-database"></i> Walmart 数据平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analysis"><i class="bi bi-graph-up"></i> 数据分析</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-3">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
